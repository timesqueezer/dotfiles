# ~/.tmux.conf — plugin-free setup (tmux 3.x)

# --- General -----------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"  # true color passthrough
set -s escape-time 0          # no delay after Esc (noticeable in vim)
set -g history-limit 50000
set -g mouse on               # scroll, select panes/windows, resize by drag
set -g focus-events on        # vim autoread etc. can see focus changes
set -s set-clipboard on       # OSC 52 clipboard (Windows Terminal supports it)
set -g display-time 2000      # status messages stay up long enough to read
set -g detach-on-destroy off  # killing a session jumps to the next one instead of detaching

# --- Windows & panes ---------------------------------------------------------
set -g base-index 1           # number windows from 1 (0 is far from the keys)
setw -g pane-base-index 1
set -g renumber-windows on    # closing a window leaves no gaps
setw -g automatic-rename on   # name windows after the running command...
set -g set-titles on          # ...and pass session:window to the terminal title
set -g set-titles-string "#S:#W"

# --- Keybindings (prefix stays C-b) ------------------------------------------
bind r source-file ~/.tmux.conf \; display "config reloaded"

# splits on memorable keys, inheriting the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# vim-style pane movement / resizing (resize repeats while prefix is held)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# prefix-free movement: Alt+arrows between panes, Shift+arrows between windows
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R
bind -n S-Left  previous-window
bind -n S-Right next-window

# scratch shell in a floating popup (exit or C-d closes it)
bind g display-popup -E -d "#{pane_current_path}" -w 80% -h 75%

# toggle typing into all panes at once (multi-server ssh)
bind S setw synchronize-panes \; display "synchronize-panes: #{?pane_synchronized,on,off}"

# --- Copy mode (vi keys, Windows clipboard via clip.exe) ----------------------
setw -g mode-keys vi
bind Escape copy-mode                  # prefix+Esc in addition to prefix+[
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "clip.exe"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "clip.exe"

# --- Status bar (quiet greys, matches the starship prompt) --------------------
set -g status-position top
set -g status-style "bg=default,fg=colour242"
set -g status-left "#[fg=colour255,bold] #S #[default]· "
set -g status-left-length 20
set -g status-right "#[fg=colour242]%a %d %b #[fg=colour255]%H:%M "
setw -g window-status-current-style "fg=colour255,bold"
setw -g window-status-style "fg=colour242"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour245"
set -g message-style "bg=default,fg=colour255"
